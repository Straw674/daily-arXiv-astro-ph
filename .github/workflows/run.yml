# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: arXiv-daily-ai-enhanced

permissions:
  contents: write

on:
  # Runs at 03:00 UTC every Monday, Tuesday, Wednesday, Thursday, Friday.
  schedule:
    - cron: "00 03 * * 1-5"
  workflow_dispatch:
    inputs:
      force_regen:
        description: "Force regenerate data for today"
        type: boolean
        default: false

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set current date
        id: date
        run: echo "today=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Prime dist from data branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          if git ls-remote --exit-code --heads origin data >/dev/null 2>&1; then
            git clone --depth 1 --branch data "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" _data_branch
            rsync -a --delete --exclude '.git' "_data_branch/" "dist/"
            rm -rf _data_branch
          else
            echo "No data branch found yet; starting with an empty dist directory."
          fi

      - name: Run script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_BASE_URL: ${{ secrets.EMBEDDING_BASE_URL }}
          EMBEDDING_MODEL_NAME: ${{ vars.EMBEDDING_MODEL_NAME }}
          LANGUAGE: ${{ vars.LANGUAGE }}
          CATEGORIES: ${{ vars.CATEGORIES }}
          MODEL_NAME: ${{ vars.MODEL_NAME }}
          CUSTOM_GROUPS: ${{ vars.CUSTOM_GROUPS }}
          LLM_REASONING_EFFORT: ${{ vars.LLM_REASONING_EFFORT }}
          CONCURRENCY_LIMIT: ${{ vars.CONCURRENCY_LIMIT }}
          ZOTERO_EMB_PATH: ${{ vars.ZOTERO_EMB_PATH }}
          ZOTERO_BIB_PATH: ${{ vars.ZOTERO_BIB_PATH }}
          OUTPUT_ROOT: "dist"
          FORCE_REGEN: ${{ github.event.inputs.force_regen || 'false' }}
        run: |
          source .venv/bin/activate
          uv run python src/main.py

      - name: Publish generated markdown to data branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: data
          publish_dir: ./dist
          commit_message: update ${{ steps.date.outputs.today }}
          user_name: ${{ vars.NAME }}
          user_email: ${{ vars.EMAIL }}
